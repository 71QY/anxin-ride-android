<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f7fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e4e8ec;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="#00000020"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="800" height="600" fill="url(#bgGrad)" rx="16"/>

  <!-- 标题 -->
  <text x="400" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#2c3e50">
    后台服务运行状态监控
  </text>

  <!-- AgentFloatService 悬浮窗区域 -->
  <g filter="url(#shadow)" transform="translate(40, 90)">
    <rect width="340" height="230" fill="#ffffff" rx="12"/>
    
    <!-- 服务标题 -->
    <rect width="340" height="50" fill="#4a90e2" rx="12"/>
    <rect y="25" width="340" height="25" fill="#4a90e2"/>
    <text x="170" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">
      AgentFloatService - AI助手悬浮窗
    </text>

    <!-- 悬浮窗图标模拟 -->
    <g transform="translate(30, 80)">
      <circle cx="60" cy="60" r="50" fill="#e8f4fd"/>
      <circle cx="60" cy="60" r="40" fill="#4a90e2" opacity="0.2"/>
      <text x="60" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" fill="#4a90e2">🤖</text>
    </g>

    <!-- 状态信息 -->
    <g transform="translate(150, 80)">
      <text x="0" y="25" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">
        <tspan x="0" dy="0">● 服务状态:</tspan>
        <tspan fill="#27ae60" font-weight="bold"> 运行中</tspan>
      </text>
      <text x="0" y="55" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">
        <tspan x="0" dy="0">● 窗口位置:</tspan>
        <tspan fill="#5a6c7d"> (50, 124)</tspan>
      </text>
      <text x="0" y="85" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">
        <tspan x="0" dy="0">● 前台通知:</tspan>
        <tspan fill="#27ae60"> 已启用</tspan>
      </text>
      <text x="0" y="115" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">
        <tspan x="0" dy="0">● 权限检查:</tspan>
        <tspan fill="#27ae60"> 已授权</tspan>
      </text>
    </g>

    <!-- 底部标签 -->
    <rect y="195" width="340" height="35" fill="#f8f9fa" rx="0" ry="0"/>
    <rect y="195" width="340" height="1" fill="#e9ecef"/>
    <text x="170" y="217" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#6c757d">
      进程ID: 12345 | 运行时长: 2h 15m
    </text>
  </g>

  <!-- LocationTrackingService 定位追踪区域 -->
  <g filter="url(#shadow)" transform="translate(420, 90)">
    <rect width="340" height="230" fill="#ffffff" rx="12"/>
    
    <!-- 服务标题 -->
    <rect width="340" height="50" fill="#e74c3c" rx="12"/>
    <rect y="25" width="340" height="25" fill="#e74c3c"/>
    <text x="170" y="32" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#ffffff">
      LocationTrackingService - 定位追踪
    </text>

    <!-- 定位图标模拟 -->
    <g transform="translate(30, 80)">
      <circle cx="60" cy="60" r="50" fill="#ffeaea"/>
      <circle cx="60" cy="60" r="40" fill="#e74c3c" opacity="0.2"/>
      <text x="60" y="65" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" fill="#e74c3c"></text>
    </g>

    <!-- 状态信息 -->
    <g transform="translate(150, 80)">
      <text x="0" y="25" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">
        <tspan x="0" dy="0">● 服务状态:</tspan>
        <tspan fill="#27ae60" font-weight="bold"> 运行中</tspan>
      </text>
      <text x="0" y="55" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">
        <tspan x="0" dy="0">● GPS精度:</tspan>
        <tspan fill="#5a6c7d"> ±5m</tspan>
      </text>
      <text x="0" y="85" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">
        <tspan x="0" dy="0">● 定位间隔:</tspan>
        <tspan fill="#5a6c7d"> 5秒</tspan>
      </text>
      <text x="0" y="115" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">
        <tspan x="0" dy="0">● 位置上报:</tspan>
        <tspan fill="#27ae60"> WebSocket推送</tspan>
      </text>
    </g>

    <!-- 底部标签 -->
    <rect y="195" width="340" height="35" fill="#f8f9fa" rx="0" ry="0"/>
    <rect y="195" width="340" height="1" fill="#e9ecef"/>
    <text x="170" y="217" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#6c757d">
      进程ID: 12345 | 位置更新: 1562次
    </text>
  </g>

  <!-- 服务协作关系 -->
  <g filter="url(#shadow)" transform="translate(40, 350)">
    <rect width="720" height="210" fill="#ffffff" rx="12"/>
    
    <!-- 协作标题 -->
    <text x="360" y="35" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2c3e50">
       服务协作关系
    </text>

    <!-- 协作流程图 -->
    <g transform="translate(60, 60)">
      <!-- AgentFloatService -->
      <rect width="140" height="40" fill="#4a90e2" rx="8"/>
      <text x="70" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">
        AgentFloatService
      </text>

      <!-- 箭头1 -->
      <path d="M 140 20 L 180 20" stroke="#4a90e2" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
      <text x="160" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#6c757d">
        触发跳转
      </text>

      <!-- MainActivity -->
      <rect x="180" y="0" width="140" height="40" fill="#2c3e50" rx="8"/>
      <text x="250" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">
        MainActivity
      </text>

      <!-- 箭头2 -->
      <path d="M 320 20 L 360 20" stroke="#2c3e50" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
      <text x="340" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#6c757d">
        调用服务
      </text>

      <!-- LocationTrackingService -->
      <rect x="360" y="0" width="140" height="40" fill="#e74c3c" rx="8"/>
      <text x="430" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">
        LocationTrackingService
      </text>

      <!-- 箭头3 -->
      <path d="M 500 20 L 540 20" stroke="#e74c3c" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
      <text x="520" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#6c757d">
        上报数据
      </text>

      <!-- WebSocket -->
      <rect x="540" y="0" width="140" height="40" fill="#27ae60" rx="8"/>
      <text x="610" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">
        WebSocket
      </text>
    </g>

    <!-- 关键特性说明 -->
    <g transform="translate(60, 120)">
      <rect width="280" height="70" fill="#f8f9fa" rx="8"/>
      <text x="140" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#4a90e2">
        AgentFloatService 特性
      </text>
      <text x="140" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#6c757d">
        • 前台服务保活 | • 悬浮窗交互 | • 权限检查
      </text>
      <text x="140" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#6c757d">
        • 长按拖动 | • 点击跳转聊天
      </text>

      <rect x="300" y="0" width="360" height="70" fill="#f8f9fa" rx="8"/>
      <text x="480" y="25" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#e74c3c">
        LocationTrackingService 特性
      </text>
      <text x="480" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#6c757d">
        • 高精度定位 | • 5秒间隔更新 | • 前台服务保活
      </text>
      <text x="480" y="60" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#6c757d">
        • WebSocket实时推送 | • HTTP备用上报
      </text>
    </g>
  </g>

  <!-- 箭头标记定义 -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a90e2"/>
    </marker>
  </defs>
</svg>
